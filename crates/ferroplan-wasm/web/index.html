<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ferroplan — PDDL planner in your browser</title>
<style>
  :root { --bg:#0f0f14; --panel:#17171f; --edge:#2a2a36; --ink:#e8e8ee; --mut:#9aa0a6; --accent:#6c5ce7; --ok:#a8d24a; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font:15px/1.5 system-ui, sans-serif; }
  header { padding:18px 22px; border-bottom:1px solid var(--edge); display:flex; align-items:baseline; gap:12px; }
  h1 { margin:0; font-size:22px; letter-spacing:-.5px; }
  h1 .fp { color:var(--accent); } h1 .pl { color:var(--mut); }
  header .tag { color:var(--mut); font-size:13px; }
  main { max-width:1100px; margin:0 auto; padding:18px 22px; }
  .row { display:flex; gap:14px; flex-wrap:wrap; }
  .col { flex:1 1 360px; min-width:300px; }
  label { display:block; font-size:12px; color:var(--mut); margin:0 0 4px 2px; text-transform:uppercase; letter-spacing:.5px; }
  textarea { width:100%; height:300px; background:var(--panel); color:var(--ink); border:1px solid var(--edge);
             border-radius:8px; padding:10px 12px; font:13px/1.45 ui-monospace, Menlo, monospace; resize:vertical; }
  .bar { display:flex; align-items:center; gap:12px; margin:14px 0; }
  button { background:var(--accent); color:#fff; border:0; border-radius:8px; padding:9px 18px; font-size:15px;
           font-weight:600; cursor:pointer; }
  button:disabled { opacity:.5; cursor:default; }
  select { background:var(--panel); color:var(--ink); border:1px solid var(--edge); border-radius:8px; padding:8px 10px; }
  .out { margin-top:6px; background:var(--panel); border:1px solid var(--edge); border-radius:8px; padding:12px 14px; }
  .stat { color:var(--mut); font-size:13px; margin-bottom:8px; }
  .stat b { color:var(--ink); }
  .err { color:#ff8a8a; }
  pre { margin:0; font:13px/1.5 ui-monospace, Menlo, monospace; white-space:pre-wrap; max-height:340px; overflow:auto; }
  footer { color:var(--mut); font-size:12px; padding:16px 22px; border-top:1px solid var(--edge); }
  a { color:var(--accent); }
</style>
</head>
<body>
<header>
  <h1><span class="fp">ferro</span><span class="pl">plan</span></h1>
  <span class="tag">a fast PDDL planner in Rust — running entirely in your browser via WebAssembly</span>
</header>
<main>
  <div class="bar" style="margin:0 0 6px">
    <label for="domain" style="margin:0">domain</label>
    <select id="domain"></select>
    <label for="problem" style="margin:0">problem</label>
    <select id="problem"></select>
    <span class="stat">— simplest → most complex; or paste your own below</span>
  </div>
  <div id="hint" class="stat" style="margin:0 0 12px 2px"></div>
  <div class="row">
    <div class="col">
      <label for="dom">Domain</label>
      <textarea id="dom" spellcheck="false"></textarea>
    </div>
    <div class="col">
      <label for="prob">Problem</label>
      <textarea id="prob" spellcheck="false"></textarea>
    </div>
  </div>
  <div class="bar">
    <button id="go" disabled>Loading…</button>
    <button id="cancel" style="display:none; background:#5a5a66">Cancel</button>
    <label for="mode" style="margin:0">mode</label>
    <select id="mode">
      <option value="auto">auto</option>
      <option value="ff">ff (classical)</option>
      <option value="pddl3">pddl3 (preferences)</option>
      <option value="partition">partition</option>
      <option value="temporal">temporal</option>
    </select>
    <label for="exec" style="margin:0">run on</label>
    <select id="exec">
      <option value="worker">Web Worker — responsive, cancelable</option>
      <option value="main">main thread — no worker needed</option>
    </select>
    <span id="took" class="stat"></span>
  </div>
  <div class="out"><div id="stat" class="stat">Paste a PDDL domain + problem and hit Plan.</div><pre id="plan"></pre></div>
</main>
<footer>
  <span id="ver"></span> · No server, no install — the planner is compiled to WebAssembly and runs locally.
  · <a href="https://github.com/hhh42/ferroplan">source</a>
</footer>

<script type="module">
import init, { plan, version } from './pkg/ferroplan_wasm.js';
import { DOMAINS } from './examples.js';

const $ = (id) => document.getElementById(id);
const go = $('go');

// Two-level picker: choose a DOMAIN, then a PROBLEM (simplest -> most complex).
// Picking only LOADS it into the editors — you hit Plan to solve (complex ones
// can take a moment), so a heavy problem never auto-runs and freezes the page.
const domSel = $('domain'), probSel = $('problem'), exec = $('exec'), cancelBtn = $('cancel');
let curFlags = '', curSlow = false;
DOMAINS.forEach((d, i) => {
  const o = document.createElement('option');
  o.value = String(i); o.textContent = d.label; domSel.appendChild(o);
});
function ready(msg) {
  const s = $('stat'); s.className = 'stat'; s.textContent = msg;
  $('plan').textContent = ''; $('took').textContent = '';
}
function loadDomain(di) {
  const d = DOMAINS[di];
  if (!d) return;
  $('dom').value = d.domain;
  probSel.innerHTML = '';
  d.problems.forEach((p, j) => {
    const o = document.createElement('option');
    o.value = String(j); o.textContent = p.label; probSel.appendChild(o);
  });
  loadProblem(di, 0);
}
function loadProblem(di, pj) {
  const d = DOMAINS[di], p = d && d.problems[pj];
  if (!p) return;
  $('prob').value = p.problem;
  if (p.mode) $('mode').value = p.mode;
  curFlags = p.flags || ''; curSlow = !!p.slow;
  $('hint').textContent = (p.note || '') + (curFlags ? '  ·  features: ' + curFlags : '');
  ready('Loaded — hit Plan' + (curSlow ? '  (heavy: ~25s — use Web Worker so the page stays responsive)' : ''));
}
domSel.addEventListener('change', () => loadDomain(+domSel.value));
probSel.addEventListener('change', () => loadProblem(+domSel.value, +probSel.value));
loadDomain(0);

// ---- Web Worker plumbing, with a main-thread fallback (workers can be blocked by
// file:// origins or strict CSP — then we switch to main and disable the option). ----
let worker = null, reqId = 0, pending = null, workerBroken = false;
function disableWorkerOption() {
  exec.value = 'main';
  const opt = [...exec.options].find(o => o.value === 'worker');
  if (opt) { opt.disabled = true; opt.textContent += ' (unavailable here)'; }
}
function makeWorker() {
  if (workerBroken) return null;
  let w;
  try { w = new Worker('./worker.js', { type: 'module' }); }
  catch (e) { workerBroken = true; disableWorkerOption(); return null; }
  w.onmessage = (e) => {
    if (pending && e.data.id === pending.id) { const p = pending; pending = null; p.resolve(e.data.res); }
  };
  w.onerror = () => {
    workerBroken = true; disableWorkerOption(); if (worker === w) worker = null;
    if (pending) { const p = pending; pending = null; p.resolve(p.fallback()); }
  };
  return w;
}
function solveWorker(domain, problem, mode, flags) {
  if (!worker) worker = makeWorker();
  if (!worker) return Promise.resolve(plan(domain, problem, mode, flags)); // no workers -> main
  return new Promise((resolve) => {
    const id = ++reqId;
    pending = { id, resolve, fallback: () => plan(domain, problem, mode, flags) };
    worker.postMessage({ id, domain, problem, mode, flags });
  });
}

await init(); // main-thread wasm instance (for main mode + the hard fallback)
$('ver').textContent = 'ferroplan v' + version();
go.disabled = false; go.textContent = 'Plan';
ready('Pick a domain + problem (or paste your own), then hit Plan.');

function setSolving(on) {
  go.disabled = on; go.textContent = on ? 'Planning…' : 'Plan';
  cancelBtn.style.display = (on && exec.value === 'worker' && !workerBroken) ? '' : 'none';
}

go.addEventListener('click', async () => {
  setSolving(true);
  const stat = $('stat'); stat.className = 'stat';
  stat.textContent = 'Planning…' + (curSlow ? '  (this one is heavy — a few seconds)' : '');
  const dom = $('dom').value, prob = $('prob').value, mode = $('mode').value, flags = curFlags;
  const t0 = performance.now();
  let raw;
  if (exec.value === 'worker') {
    raw = await solveWorker(dom, prob, mode, flags);
  } else {
    await new Promise(r => setTimeout(r, 10)); // let 'Planning…' paint before the sync solve
    try { raw = plan(dom, prob, mode, flags); } catch (e) { raw = JSON.stringify({ error: String(e) }); }
  }
  if (raw == null) { setSolving(false); return; } // cancelled
  let res; try { res = JSON.parse(raw); } catch (e) { res = { error: String(e) }; }
  render(res, (performance.now() - t0).toFixed(1));
  setSolving(false);
});

cancelBtn.addEventListener('click', () => {
  if (worker) { worker.terminate(); worker = null; } // a fresh worker is made on next solve
  if (pending) { const p = pending; pending = null; p.resolve(null); }
  ready('Cancelled.');
});

function render(res, ms) {
  const stat = $('stat'), out = $('plan');
  $('took').textContent = ms + ' ms';
  if (res.error) {
    stat.className = 'stat err'; stat.textContent = 'Error: ' + res.error; out.textContent = ''; return;
  }
  stat.className = 'stat';
  const p = res.plan, s = res.statistics || {};
  if (!res.solved || !p) {
    stat.textContent = 'No plan found (' + (res.mode || '') + ').'; out.textContent = ''; return;
  }
  let head = `solved · ${p.length} steps`;
  if (p.metric != null) head += ` · metric ${p.metric}`;
  if (p.makespan != null) head += ` · makespan ${p.makespan}`;
  head += ` · ${s.evaluated_states ?? '?'} states · ${s.grounded_actions ?? '?'} ground actions`;
  stat.innerHTML = '<b>' + head + '</b>';
  out.textContent = p.steps.map(st => {
    const t = st.time != null ? st.time.toFixed(3) + ': ' : '';
    const d = st.duration != null ? ' [' + st.duration + ']' : '';
    return `${String(st.index).padStart(3)}: ${t}(${[st.action, ...st.args].join(' ')})${d}`;
  }).join('\n');
}
</script>
</body>
</html>
