<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ferroplan — visualizer & animator (in-browser)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0d11; --bg2:#0e1116; --panel:#12161d; --panel2:#161b23;
    --edge:#222a34; --edge2:#313b48; --ink:#e8ebf0; --mut:#8b94a3; --faint:#525b69;
    --acc:#ff6a3a; --cy:#46d3c6;
  }
  *{box-sizing:border-box;}
  html,body{margin:0; height:100%; background:var(--bg); color:var(--ink);
            font:14px/1.5 'Space Grotesk',system-ui,sans-serif; overflow:hidden;}
  a{color:var(--ink); text-decoration:none;}
  .mono{font-family:'JetBrains Mono',ui-monospace,monospace;}
  #bar{position:fixed; top:0; left:0; right:0; height:46px; display:flex; align-items:center;
       gap:14px; padding:0 16px; border-bottom:1px solid var(--edge);
       background:rgba(11,13,17,.85); backdrop-filter:blur(6px); z-index:10;}
  #bar .word{font-size:16px; font-weight:600; letter-spacing:-.5px; line-height:1;}
  nav{display:flex; gap:3px; background:var(--bg2); border:1px solid var(--edge); border-radius:8px; padding:3px; margin-left:6px;}
  nav a{font-family:'JetBrains Mono',monospace; font-size:11.5px; padding:5px 11px; border-radius:6px; color:var(--mut); border:1px solid transparent; transition:color .12s,border-color .12s;}
  nav a:hover{color:var(--ink);}
  nav a.on{color:var(--ink); background:var(--panel2); border-color:var(--edge2);}
  .keys{color:var(--faint); font-family:'JetBrains Mono',monospace; font-size:11px; margin-left:8px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .keys b{color:var(--mut); font-weight:500;}
  #bar .right{margin-left:auto; display:flex; align-items:center; gap:12px;}
  #bar .right a{font-family:'JetBrains Mono',monospace; font-size:11.5px; color:var(--mut);}
  #bar .right a:hover{color:var(--ink);}
  #stage{position:fixed; inset:46px 0 0 0;}
  #ferroplan-canvas{width:100%; height:100%; display:block;}
  #loading{position:fixed; inset:46px 0 0 0; display:flex; align-items:center; justify-content:center;
           color:var(--mut); flex-direction:column; gap:12px;
           font-family:'JetBrains Mono',monospace; font-size:13px;}
  .spin{width:26px; height:26px; border:2.5px solid var(--edge2); border-top-color:var(--acc);
        border-radius:50%; animation:r .7s linear infinite;} @keyframes r{to{transform:rotate(360deg);}}
</style>
</head>
<body>
  <div id="bar">
    <svg width="26" height="26" viewBox="0 0 40 40" aria-hidden="true" style="display:block; flex:none;">
      <g fill="none" stroke="var(--edge2)" stroke-width="2.2" stroke-linecap="round">
        <path d="M9 11 L29 8 M9 11 L12 30 M29 8 L31 27 M12 30 L31 27 M29 8 L12 30"/>
      </g>
      <rect x="3.5" y="5.5" width="11" height="11" rx="2.5" transform="rotate(45 9 11)" fill="var(--cy)"/>
      <circle cx="29" cy="8" r="4.6" fill="#7e8794"/>
      <circle cx="12" cy="30" r="4.6" fill="#7e8794"/>
      <rect x="25.5" y="22.5" width="11" height="11" rx="2.5" fill="var(--acc)"/>
    </svg>
    <span class="word">ferroplan</span>
    <nav>
      <a href="../demo/index.html">Solver</a>
      <a id="navViz" href="./">Visualizer</a>
      <a id="navAnim" href="#animate">Animator</a>
    </nav>
    <span class="keys"><b>E</b> editor · <b>Tab</b> problem/domain · <b>S</b> solve · <b>Space</b> play · drag nodes · scroll zoom · click to inspect</span>
    <div class="right"><a href="../">← docs</a></div>
  </div>
  <div id="stage"><canvas id="ferroplan-canvas"></canvas></div>
  <div id="loading"><div class="spin"></div><div>loading the visualizer (WebAssembly)…</div></div>

  <script>
    // Reflect Visualizer/Animator in the nav from the URL hash (both are the same
    // Bevy app; the hash tells it which mode to open in — see the Rust handoff reader).
    function syncNav(){
      const anim = location.hash === '#animate';
      document.getElementById('navViz').classList.toggle('on', !anim);
      document.getElementById('navAnim').classList.toggle('on', anim);
    }
    syncNav(); addEventListener('hashchange', syncNav);
  </script>
  <script type="module">
    import init from './pkg/ferroplan-bevy.js';
    // Bevy's winit throws a benign control-flow exception on the wasm event loop.
    init()
      .then(() => { const l = document.getElementById('loading'); if (l) l.remove(); })
      .catch((e) => {
        if (e && typeof e.message === 'string' && e.message.includes('control flow')) {
          const l = document.getElementById('loading'); if (l) l.remove();
        } else { throw e; }
      });
  </script>
</body>
</html>
