name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install mdBook
        run: cargo install mdbook --version "^0.4" --locked
      # Publish the committed benchmark numbers as-is — they're machine-dependent
      # (generated locally per benchmarks/COMPARING.md), so re-running the suite on a
      # CI runner is slow and not meaningful. Regenerate locally + commit when needed.
      - name: Wire benchmark results into the book
        run: cp benchmarks/results.md book/src/results.md
      - name: Build the in-browser planner demo (WASM)
        run: |
          rustup target add wasm32-unknown-unknown
          cargo install wasm-bindgen-cli --version 0.2.126 --locked
          crates/ferroplan-wasm/build.sh
      - name: Build the in-browser GUI (Bevy WASM)
        run: crates/ferroplan-bevy/build-wasm.sh
      - name: Build book
        run: mdbook build book
      - name: Bundle the WASM demos into the site (/demo/ planner, /gui/ visualizer)
        run: |
          cp -r crates/ferroplan-wasm/web book/book/demo
          cp -r crates/ferroplan-bevy/web book/book/gui
      - uses: actions/upload-pages-artifact@v3
        with:
          path: book/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
