name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install mdBook
        run: cargo install mdbook --version "^0.4" --locked
      - name: Generate benchmark results
        run: python3 benchmarks/run.py --timeout 30
      - name: Wire results into the book
        run: cp benchmarks/results.md book/src/results.md
      - name: Build the in-browser planner demo (WASM)
        run: |
          rustup target add wasm32-unknown-unknown
          cargo install wasm-bindgen-cli --version 0.2.106 --locked
          crates/ferroplan-wasm/build.sh
      - name: Build book
        run: mdbook build book
      - name: Bundle the WASM demo into the site (served at /demo/)
        run: cp -r crates/ferroplan-wasm/web book/book/demo
      - uses: actions/upload-pages-artifact@v3
        with:
          path: book/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
