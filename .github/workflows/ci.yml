name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Core library + CLI. Excludes the Bevy GUI (the engine needs heavy system
  # libraries to build on Linux; it's built locally for now).
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --exclude ferroplan-bevy --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --workspace --exclude ferroplan-bevy
      # The IPC-benchmark regression guards (espc / ipc5_pref_metric) are `#[ignore]`d
      # so they don't bloat the default `cargo test` (and the publish pre-flight) with
      # multi-minute solves. Run them here in release, where they're ~3× faster.
      - name: Heavy IPC regression guards (release)
        run: cargo test --release -p ferroplan -- --ignored
      - name: Docs
        run: cargo doc --no-deps --all-features --workspace --exclude ferroplan-bevy
        env:
          RUSTDOCFLAGS: -D warnings
      - name: Bench compiles (perf gate)
        run: cargo bench --no-run -p ferroplan
