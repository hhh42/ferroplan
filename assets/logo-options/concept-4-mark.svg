<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96" role="img" aria-label="ferroplan mark">
  <title>ferroplan</title>
  <g transform="translate(8 8)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- frontier edges -->
    <g stroke="#9aa0a6" stroke-width="4" opacity="0.5">
      <path d="M14 40 L46 14 M14 40 L46 66 M46 14 L74 30 M46 66 L74 56 M46 14 L46 66"/>
    </g>
    <!-- expanded solution branch -->
    <path d="M14 40 L46 66 L74 56" stroke="#6c5ce7" stroke-width="7"/>
    <!-- frontier states -->
    <circle cx="46" cy="14" r="9" fill="#9aa0a6"/>
    <circle cx="74" cy="30" r="9" fill="#9aa0a6"/>
    <!-- root + expanded -->
    <rect x="5" y="31" width="18" height="18" rx="3" fill="#6c5ce7"/>
    <circle cx="46" cy="66" r="9" fill="#6c5ce7"/>
    <!-- goal -->
    <rect x="64" y="46" width="20" height="20" rx="3" fill="#a8d24a"/>
  </g>
</svg>
