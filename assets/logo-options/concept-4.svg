<svg xmlns="http://www.w3.org/2000/svg" width="450" height="120" viewBox="0 0 450 120" role="img" aria-label="ferroplan">
  <title>ferroplan</title>
  <!-- Concept 4: State-space search. A small lattice of states; most edges
       are dim "frontier", one highlighted branch reaches the goal. Palette:
       indigo #6c5ce7 expanded path, grey #9aa0a6 frontier, green #a8d24a goal. -->
  <g transform="translate(12 8)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- frontier edges (unexpanded) -->
    <g stroke="#9aa0a6" stroke-width="3.5" opacity="0.5">
      <path d="M14 52 L46 22 M14 52 L46 82 M46 22 L84 38 M46 82 L84 70 M46 22 L46 82"/>
    </g>
    <!-- expanded solution branch: root -> mid -> goal -->
    <path d="M14 52 L46 82 L84 70" stroke="#6c5ce7" stroke-width="6"/>
    <!-- frontier states -->
    <circle cx="46" cy="22" r="8" fill="#9aa0a6"/>
    <circle cx="84" cy="38" r="8" fill="#9aa0a6"/>
    <!-- root + expanded states (square = explored) -->
    <rect x="6" y="44" width="16" height="16" rx="3" fill="#6c5ce7"/>
    <circle cx="46" cy="82" r="8" fill="#6c5ce7"/>
    <!-- goal state -->
    <rect x="76" y="62" width="18" height="18" rx="3" fill="#a8d24a"/>
  </g>
  <!-- Wordmark -->
  <text x="124" y="76" font-family="system-ui, sans-serif" font-size="52" font-weight="600" letter-spacing="-1.5">
    <tspan fill="#6c5ce7">ferro</tspan><tspan fill="#9aa0a6">plan</tspan>
  </text>
</svg>
